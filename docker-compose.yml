version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/daily-cp-battle
      - JWT_SECRET=local_dev_secret_change_in_prod
      - JWT_EXPIRES_IN=7d
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      - mongo
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
